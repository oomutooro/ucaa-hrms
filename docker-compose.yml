services:
  postgres:
    image: postgres:16
    container_name: ucaa_hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ucaa_hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: UCAA.HRMS.API/Dockerfile
    container_name: ucaa_hrms_api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=ucaa_hrms;Username=postgres;Password=postgres
      Jwt__Issuer: UCAA.HRMS
      Jwt__Audience: UCAA.HRMS.Client
      Jwt__Key: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_32_CHARS_MIN
      FrontendUrl: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./ucaa-hrms-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080/api
    container_name: ucaa_hrms_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
