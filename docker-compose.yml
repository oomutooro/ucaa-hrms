services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ucaa_hrms_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: UCAA.HRMS.API/Dockerfile
    container_name: ucaa_hrms_api
    restart: unless-stopped
    depends_on:
      - sqlserver
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ucaa_hrms;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;MultipleActiveResultSets=true
      Jwt__Issuer: UCAA.HRMS
      Jwt__Audience: UCAA.HRMS.Client
      Jwt__Key: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_32_CHARS_MIN
      FrontendUrl: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./ucaa-hrms-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: ucaa_hrms_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  sqlserver_data:
